[tools]
go = "1.25.1"

[env]
GOCACHE = "/tmp/go-sshlib-gocache"
GOTMPDIR = "/tmp/go-sshlib-gotmp"

[tasks.test]
description = "Run the default Go test suite"
run = "bash ./scripts/setup-go-env.sh && go test ./..."

[tasks.test-unit]
description = "Run the unit test suite"
run = "bash ./scripts/setup-go-env.sh && go test ./..."

[tasks.test-integration]
description = "Run integration tests against the Dockerized SSH server"
run = "bash ./scripts/test-integration.sh"

[tasks.test-ci]
description = "Run the CI test flow"
run = "bash ./scripts/test-ci.sh"
